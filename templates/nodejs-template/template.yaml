apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: nodejs-template
  title: Node.js API Service
  description: Create a Node.js Express service

spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service Information
      required:
        - name
      properties:
        name:
          type: string
          title: Service Name
          description: Unique service name

  steps:
    # STEP 1 — Generate files
    - id: fetch-base
      name: Fetch Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}

    # STEP 2 — Publish to GitHub
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=rkpranjeet198&repo=${{ parameters.name }}
        defaultBranch: main
        description: Generated by Backstage

    # STEP 3 — Register in Catalog
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Open Repository
        url: ${{ steps.publish.output.remoteUrl }}

      - title: Open Component in Catalog
        url: /catalog/default/component/${{ parameters.name }}